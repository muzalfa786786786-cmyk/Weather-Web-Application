<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherApp | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body id="dashboardBody">
    <!-- Rain animation overlay (hidden by default) -->
    <div id="rainOverlay" class="rain-overlay"></div>

    <div class="glass-card dashboard-card">
        <!-- Header with logout -->
        <div class="dashboard-header">
            <h2><i class="fas fa-cloud-sun"></i> Weather Dashboard</h2>
            <a href="login.html" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>

        <!-- Search & unit toggle -->
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Search city..." value="London">
                <button id="searchBtn"><i class="fas fa-search"></i></button>
            </div>
            <div class="unit-toggle">
                <button id="celsiusBtn" class="unit-btn active">°C</button>
                <button id="fahrenheitBtn" class="unit-btn">°F</button>
            </div>
        </div>

        <!-- Error message -->
        <div id="errorMsg" class="error-msg"></div>

        <!-- Current weather -->
        <div id="currentWeather" class="current-weather">
            <div class="city" id="cityDisplay">--</div>
            <div class="weather-main">
                <div>
                    <span class="temp" id="tempDisplay">--</span>
                    <span class="condition" id="conditionDisplay">--</span>
                </div>
                <div class="icon" id="iconDisplay"><i class="fas fa-cloud-sun"></i></div>
            </div>
            <div class="details">
                <div class="detail"><i class="fas fa-droplet"></i> <span id="humidityDisplay">--%</span></div>
                <div class="detail"><i class="fas fa-wind"></i> <span id="windDisplay">-- km/h</span></div>
            </div>
        </div>

        <!-- 5-day forecast -->
        <h3 class="forecast-title">5‑Day Forecast</h3>
        <div id="forecastContainer" class="forecast-grid"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
